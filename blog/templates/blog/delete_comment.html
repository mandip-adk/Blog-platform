{% extends "base.html" %}

{% block title %}Delete Comment{% endblock %}

{% block content %}
<div class="form-page mt-5">

  <div class="card border-danger">
    <div class="card-header bg-danger text-white">
      Confirm Deletion
    </div>
    <div class="card-body" style="padding: 2rem;">

      <h5 class="card-title" style="font-family: var(--font-display); font-size: 1.3rem;">
        Are you sure you want to delete this comment?
      </h5>

      <div class="comment-card mt-3">
        <span class="comment-author">{{ comment.author }}</span>
        <p class="comment-body">{{ comment.text }}</p>
      </div>

      <p class="text-danger small mt-3">This action cannot be undone.</p>

      <form method="POST" novalidate>
        {% csrf_token %}
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-danger">Yes, Delete</button>
          <a href="{% url 'blog_details' comment.post.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>

    </div>
  </div>

</div>
{% endblock %}
